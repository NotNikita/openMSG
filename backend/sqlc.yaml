version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/repository/queries.sql"
    schema: "../db/migrations/001_init.sql"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/repository/sqlcgen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_pointers_for_null_types: true
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
        omit_unused_structs: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
