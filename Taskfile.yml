version: "3"

tasks:
  up:
    desc: Start all services
    cmd: docker compose up --build -d

  down:
    desc: Stop all services
    cmd: docker compose down

  migrate:
    desc: Run database migrations
    cmd: docker compose exec postgres psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -f /docker-entrypoint-initdb.d/001_init.sql

  logs:
    desc: Tail logs for all services
    cmd: docker compose logs -f

  sqlc:
    desc: Regenerate sqlc type-safe query code from queries.sql
    dir: backend
    cmd: sqlc generate

  generate:
    desc: Generate minimock mocks from repository interfaces
    dir: backend
    cmd: go generate ./internal/repository/...

  test:
    desc: Run backend unit tests
    dir: backend
    cmd: go test ./internal/service/... -v

  build:
    desc: Build the Go backend binary
    dir: backend
    cmd: go build -o bin/server ./cmd/server
